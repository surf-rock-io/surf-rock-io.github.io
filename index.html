<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Our Newsletter Archive — Surf Rock Media</title>
<style>
  :root {
    --text: #111;
    --muted: #8a8a8a;
    --rule: #e5e5e5;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 0 24px 96px;
    background: #fff;
    color: var(--text);
    font: 16px/1.6 "Helvetica Neue", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 640px;
    margin: 0 auto;
  }

  header {
    padding: 80px 0 48px;
    text-align: center;
  }

  .site {
    display: inline-block;
    margin-bottom: 40px;
  }

  .site img {
    display: block;
    width: 260px;
    max-width: 70%;
    height: auto;
    margin: 0 auto;
  }

  h1 {
    margin: 0;
    font-size: 30px;
    font-weight: 400;
    letter-spacing: 0.02em;
  }

  .sub {
    margin: 12px 0 0;
    color: var(--muted);
    font-size: 14px;
  }

  /* Mailchimp archive list */
  .display_archive {
    margin: 0;
    padding: 0;
    list-style: none;
    border-top: 1px solid var(--rule);
  }

  .display_archive .campaign {
    margin: 0;
    padding: 18px 0;
    border-bottom: 1px solid var(--rule);
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.04em;
  }

  .display_archive .campaign a {
    display: block;
    margin-top: 4px;
    color: var(--text);
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0;
    text-decoration: none;
  }

  .display_archive .campaign a:hover { text-decoration: underline; }

  footer {
    padding-top: 56px;
    text-align: center;
  }

  .signup {
    display: inline-block;
    padding: 12px 26px;
    border: 1px solid var(--text);
    color: var(--text);
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    text-decoration: none;
  }

  .signup:hover {
    background: var(--text);
    color: #fff;
  }

  @media (max-width: 600px) {
    header { padding: 48px 0 32px; }
    h1 { font-size: 24px; }
  }
</style>
</head>
<body>

<div class="wrap">

  <header>
    <a class="site" href="https://surfrockmedia.com">
      <img src="https://raw.githubusercontent.com/surf-rock-io/surf-rock-io.github.io/main/Wide%20-%20%20Small%20White%20Canvas.png" alt="Surf Rock Media">
    </a>
    <h1>Our Newsletter Archive</h1>
    <p class="sub">Every issue we&rsquo;ve sent, in one place.</p>
  </header>

  <main>
    <script
      language="javascript"
      src="https://surfrockvideo.us6.list-manage.com/generate-js/?u=b5aa942e9289d1765837fa4d9&show=10&fid=23235"
      type="text/javascript"></script>
  </main>

  <footer>
    <a class="signup" href="https://mailchi.mp/b8bf7dbe6dcc/newsletter">Sign Up for the Newsletter</a>
  </footer>

</div>

</body>
</html>
